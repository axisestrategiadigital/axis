<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo à Axis Estratégia Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --accent: #d4af37; /* Gold elegante */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --whatsapp: #25d366;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Detalhe de luz no topo */
        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 6px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent);
        }

        .tagline {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .description {
            color: var(--text-dim);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Badge de Equipamento */
        .equipment-badge {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 35px;
        }

        .equipment-badge p {
            font-size: 13px;
            color: var(--accent);
            font-weight: 500;
        }

        .equipment-badge strong {
            display: block;
            font-size: 14px;
            color: var(--text-main);
        }

        /* Botão Principal */
        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--text-main);
            color: var(--bg-dark);
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .cta-button:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        /* Botão WhatsApp */
        .whatsapp-button {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--whatsapp);
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid rgba(37, 211, 102, 0.3);
            transition: all 0.3s ease;
        }

        .whatsapp-button:hover {
            background: rgba(37, 211, 102, 0.1);
            border-color: var(--whatsapp);
        }

        .whatsapp-button svg {
            margin-right: 10px;
            fill: currentColor;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 24px;
            }
            .logo {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">AX<span>IS</span></div>
        <div class="tagline">Estratégia Digital</div>
        
        <h1>Bem-vindo ao próximo nível.</h1>
        
        <p class="description">
            Sua presença digital merece o olhar de quem domina a técnica e a estética. Estamos prontos para transformar sua imagem em autoridade.
        </p>

        <div class="equipment-badge">
            <p>TECNOLOGIA DE CINEMA</p>
            <strong>+ de R$ 20.000 investidos em equipamentos de ponta.</strong>
        </div>
